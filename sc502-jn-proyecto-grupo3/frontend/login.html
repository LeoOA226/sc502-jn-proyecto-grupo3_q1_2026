<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="utf-8">
        <title>Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">

    </head>
    <body class="bg-light">

        <nav class="navbar navbar-expand-lg navbar-light navbar-sg sticky-top">
            <div class="container-fluid">

                <a class="navbar-brand d-flex align-items-center me-3" th:href="@{/productos}">
                    <img src="/images/logo.png" alt="SuperGO"
                         style="height:70px; width:auto; margin-right:8px;">
                </a>

                <button class="navbar-toggler border-0 bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navLogin">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navLogin">

                    <form th:action="@{/productos}" method="get" class="d-flex flex-grow-1 justify-content-center my-2 my-lg-0">
                        <div class="input-group nav-search">
                            <input class="form-control" type="text" name="q" placeholder="Buscar productos...">
                            <button class="btn btn-light" type="submit">Buscar</button>
                        </div>
                    </form>

                    <div class="d-flex align-items-center ms-lg-3 mt-2 mt-lg-0">
                        <a class="nav-pill nav-pill-cart text-decoration-none me-2" th:href="@{/carrito}">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path d="M6 6h15l-1.6 8.2a2 2 0 0 1-2 1.6H8.2a2 2 0 0 1-2-1.6L4.6 2.8H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor"/>
                                <path d="M18 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor"/>
                            </svg>
                            Ver carrito
                        </a>

                        <a class="nav-pill nav-pill-login text-decoration-none" th:href="@{/auth/login}">
                            Iniciar sesión
                        </a>
                    </div>

                </div>
            </div>
        </nav>

        <section class="container auth-shell d-flex justify-content-center align-items-center py-4">
            <div style="width:100%;max-width:460px;">

                <div class="auth-hero">
                    <img src="/images/categorias/todos.jpg" alt="SuperGO">
                    <div class="overlay">
                        <div>
                            <p class="title">Bienvenido a SuperGO</p>
                            <p class="subtitle">Inicia sesión para comprar rápido y ver tu carrito.</p>
                        </div>
                    </div>
                </div>

                <div class="card auth-card card-sg">
                    <div class="card-body p-4 p-md-4">

                        <h1 class="h4 mb-1" style="font-weight:700;">Ingresar</h1>
                        <p class="text-muted mb-4" style="font-weight:500;">Accede con tu usuario y contraseña</p>

                        <form th:action="@{/auth/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Usuario</label>
                                <input class="form-control" type="text" name="username" autocomplete="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input class="form-control" type="password" name="password" autocomplete="current-password" required>
                            </div>

                            <button class="btn btn-auth w-100" type="submit">Entrar</button>
                        </form>

                        <div th:if="${error}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>
                        <div th:if="${msg}" class="alert alert-info mt-3 mb-0" th:text="${msg}"></div>

                        <div class="links mt-3">
                            <a th:href="@{/auth/registro}">Registrarme</a>
                            <span class="text-muted"> · </span>
                            <a th:href="@{/auth/forgot}">Olvidé mi contraseña</a>
                        </div>

                    </div>
                </div>

            </div>
        </section>

        <footer class="footer-sg border-top py-3 mt-4">
            <div class="container text-center small text-muted">
                SuperGO 2026. Todos los Derechos Reservados
            </div>
        </footer>

        <script src="js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
